# Defaults for every host. Override per-inventory under `vars:`.
# Pinned image tags are loaded from ../versions.yml by site.yml - not duplicated here.

# ── Host bootstrap ────────────────────────────────────────────────────────────
swap_file: /swapfile
swap_size_mb: 2048            # 0 disables swap creation

# ── Panel ─────────────────────────────────────────────────────────────────────
panel_port: 8000             # Marzneshin dashboard/API (uvicorn), host-networked
panel_docs: true             # expose Swagger at /docs (handy while building)
panel_compose_dir: /opt/vpn-setup/panel
marzneshin_data_dir: /var/lib/marzneshin

# Sudo admin - generated once, persisted on the control node under ansible/.secrets/,
# reused on every re-run (so the API password is stable). gitignored.
panel_sudo_username: admin
panel_sudo_password: "{{ lookup('password', playbook_dir + '/.secrets/panel_admin_' + inventory_hostname + '.txt length=24 chars=ascii_letters,digits') }}"

# Subscription link base: https://<domain> when a domain is set, else IP-only test URL.
subscription_url_prefix: >-
  {{ ('https://' + panel_domain) if (panel_domain | default('') | length > 0)
     else ('http://' + ansible_host + ':' + (panel_port | string)) }}

# ── TLS reverse proxy (Caddy) ─────────────────────────────────────────────────
# Runs on the panel host only when panel_domain is set: terminates HTTPS with an
# automatic Let's Encrypt cert and proxies to the panel's loopback port. With a
# domain the public panel_port is closed; Caddy owns 80/443 instead.
caddy_compose_dir: /opt/vpn-setup/caddy
caddy_data_dir: /var/lib/caddy
acme_email: ""               # optional Let's Encrypt account email

# ── vpnbot (Telegram delivery bot, containerised on the panel host) ───────────
# Opt-in per host with vpnbot_enabled (see roles/vpnbot). The bot reaches the AWG
# node agents with this restricted key (generated by site.yml, authorised per node
# with a forced command). The token is a gitignored secret file; admins (numeric
# Telegram ids) are set in the inventory.
vpnbot_ssh_key_path: "{{ playbook_dir }}/.secrets/vpnbot_ssh"
vpnbot_token: "{{ lookup('file', playbook_dir + '/.secrets/vpnbot_token.txt') }}"

# ── Node (marznode) ───────────────────────────────────────────────────────────
node_mode: local             # `local` = all-in-one w/ the panel; `nodes` group overrides to `remote`
node_compose_dir: /opt/vpn-setup/node
marznode_dir: /var/lib/marznode
marznode_port: 53042         # panel ↔ marznode gRPC (secure, panel-cert authenticated)

# ── Protocol ports (host networking; opened in firewalld) ─────────────────────
reality_port: 443            # VLESS-Reality (needs no domain)
hysteria2_port: 8443         # Hysteria2 (UDP)
tuic_port: 8444              # TUIC (UDP, via sing-box)
shadowsocks_port: 8388       # Shadowsocks (TCP+UDP)
trojan_port: 8445            # Trojan (TCP, TLS)

# ── Hysteria2 + TUIC ──────────────────────────────────────────────────────────
# Both are UDP protocols that require TLS but the nodes have no per-node domain, so
# they share a per-node self-signed cert and their subscription links set
# `allowinsecure`. This trades cert authentication for working out of the box on a
# bare IP; the connection is direct (no CDN to MITM), auth is by per-user password,
# and Hysteria2's salamander obfs makes the port appear closed without the password.
# Give a node a real domain + cert to drop `allowinsecure` later. Toggle per host.
hysteria2_enabled: true
tuic_enabled: true
# Trojan also needs TLS and shares the same per-node self-signed cert + SNI +
# allowinsecure story (it just rides xray over TCP instead of a UDP core).
trojan_enabled: true
# SNI presented in the TLS handshake (blending only; the cert is self-signed).
tls_sni: "www.bing.com"

# Shadowsocks is plaintext (its own AEAD, no TLS/domain), so it needs none of the
# above - just an xray inbound and an open port. Cipher is chosen per user by the
# panel (classic AEAD: aes-128-gcm / aes-256-gcm / chacha20-ietf-poly1305).
shadowsocks_enabled: true

# VLESS-Reality borrow target (dest + serverNames). Must be a real, reachable
# TLS 1.3 + X25519 site whose handshake xray can proxy. Verified good defaults:
# dl.google.com, www.google.com, www.cloudflare.com. NOTE: www.microsoft.com is
# NOT usable (its edge negotiates a handshake xray-core cannot borrow → "REALITY:
# processed invalid connection"). Override per-inventory for the target region.
reality_sni: "dl.google.com"
