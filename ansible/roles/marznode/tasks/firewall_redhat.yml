# RedHat/AlmaLinux ship firewalld. The always-on Reality port is opened with a raw
# firewall-cmd (note: it prints "success" to stdout but "ALREADY_ENABLED" to stderr,
# so the idempotency check reads stderr - stdout would report changed, and reload
# firewalld, on every run). Every toggled protocol below instead uses the firewalld
# module with state derived from its flag, so disabling a protocol closes its port
# rather than leaving a dead opening (permanent+immediate, no reload handler needed).
- name: Open the Reality port in firewalld
  ansible.builtin.command: "firewall-cmd --permanent --add-port={{ reality_port }}/tcp"
  register: _fw_reality
  changed_when: "'ALREADY_ENABLED' not in _fw_reality.stderr"
  notify: reload firewalld

- name: Set the Hysteria2 port state in firewalld (UDP)
  ansible.posix.firewalld:
    port: "{{ hysteria2_port }}/udp"
    permanent: true
    immediate: true
    state: "{{ 'enabled' if (hysteria2_enabled | default(false) | bool) else 'disabled' }}"

- name: Set the TUIC port state in firewalld (UDP)
  ansible.posix.firewalld:
    port: "{{ tuic_port }}/udp"
    permanent: true
    immediate: true
    state: "{{ 'enabled' if (tuic_enabled | default(false) | bool) else 'disabled' }}"

# Follows the flag: opens the port when Shadowsocks is enabled, and closes it again
# when disabled (the default) so turning the protocol off leaves no dead opening. The
# firewalld module applies permanent+immediate itself, so no reload handler is needed.
- name: Set the Shadowsocks port state in firewalld (TCP+UDP)
  ansible.posix.firewalld:
    port: "{{ shadowsocks_port }}/{{ item }}"
    permanent: true
    immediate: true
    state: "{{ 'enabled' if (shadowsocks_enabled | default(false) | bool) else 'disabled' }}"
  loop: [tcp, udp]

- name: Set the Trojan port state in firewalld (TCP)
  ansible.posix.firewalld:
    port: "{{ trojan_port }}/tcp"
    permanent: true
    immediate: true
    state: "{{ 'enabled' if (trojan_enabled | default(false) | bool) else 'disabled' }}"
