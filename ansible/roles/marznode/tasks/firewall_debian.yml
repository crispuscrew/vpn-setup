# Debian has no host firewall configured by default. Use ufw, and allow SSH FIRST
# so enabling the firewall can never lock us out. Then the Reality port; the gRPC
# port from the panel is opened later, in remote_prep.yml, for remote nodes only.
# Every toggled protocol below follows its flag: allow when enabled, delete the rule
# when disabled, so turning a protocol off removes its opening instead of leaving it.
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true

- name: Allow SSH before enabling the firewall
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow the Reality port
  community.general.ufw:
    rule: allow
    port: "{{ reality_port }}"
    proto: tcp

- name: Set the Hysteria2 port rule (UDP)
  community.general.ufw:
    rule: allow
    port: "{{ hysteria2_port }}"
    proto: udp
    delete: "{{ not (hysteria2_enabled | default(false) | bool) }}"

- name: Set the TUIC port rule (UDP)
  community.general.ufw:
    rule: allow
    port: "{{ tuic_port }}"
    proto: udp
    delete: "{{ not (tuic_enabled | default(false) | bool) }}"

- name: Set the Shadowsocks port rule (TCP+UDP)
  community.general.ufw:
    rule: allow
    port: "{{ shadowsocks_port }}"
    proto: "{{ item }}"
    delete: "{{ not (shadowsocks_enabled | default(false) | bool) }}"
  loop: [tcp, udp]

- name: Set the Trojan port rule (TCP)
  community.general.ufw:
    rule: allow
    port: "{{ trojan_port }}"
    proto: tcp
    delete: "{{ not (trojan_enabled | default(false) | bool) }}"

- name: Enable ufw (default deny incoming, allow outgoing)
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
