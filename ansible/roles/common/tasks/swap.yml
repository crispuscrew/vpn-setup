# Add a swapfile only when the host has no active swap. dd (not fallocate) so the
# file is fully allocated - mkswap rejects sparse files.
- name: Detect existing swap
  ansible.builtin.command: swapon --noheadings --show=NAME
  register: swap_show
  changed_when: false

- name: Set up a swapfile
  when: swap_show.stdout | trim | length == 0
  block:
    - name: Allocate the swapfile ({{ swap_size_mb }} MB)
      ansible.builtin.command: "dd if=/dev/zero of={{ swap_file }} bs=1M count={{ swap_size_mb }}"
      args:
        creates: "{{ swap_file }}"

    - name: Restrict swapfile permissions
      ansible.builtin.file:
        path: "{{ swap_file }}"
        owner: root
        group: root
        mode: "0600"

    - name: Initialise the swap area
      ansible.builtin.command: "mkswap {{ swap_file }}"

    - name: Enable swap
      ansible.builtin.command: "swapon {{ swap_file }}"

    - name: Persist swap in fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: "^{{ swap_file | regex_escape }}\\s"
        line: "{{ swap_file }} none swap sw 0 0"
