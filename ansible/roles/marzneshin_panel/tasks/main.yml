# Bring up the Marzneshin panel (pinned, SQLite, host-networked) and create the
# sudo admin non-interactively from SUDO_USERNAME/SUDO_PASSWORD.
- name: Ensure panel directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ panel_compose_dir }}"
    - "{{ marzneshin_data_dir }}"

- name: Render panel .env
  ansible.builtin.template:
    src: env.j2
    dest: "{{ panel_compose_dir }}/.env"
    mode: "0600"
  no_log: true

- name: Render panel compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ panel_compose_dir }}/docker-compose.yml"
    mode: "0644"

# Expose the panel port publicly only when nothing fronts it. With panel_domain
# set, Caddy terminates TLS on 443 and reaches the panel over loopback, so the
# plain-HTTP port is closed to the internet.
- name: Panel port open only without a TLS reverse proxy
  ansible.posix.firewalld:
    port: "{{ panel_port }}/tcp"
    permanent: true
    immediate: true
    state: "{{ 'disabled' if (panel_domain | default('') | length > 0) else 'enabled' }}"

- name: Start the panel
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ panel_compose_dir }}"
  register: _panel_up
  changed_when: >-
    ('Started' in _panel_up.stderr) or ('Created' in _panel_up.stderr)
    or ('Recreated' in _panel_up.stderr)

- name: Wait for the panel API to answer
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ panel_port }}/dashboard/"
    status_code: [200]
  register: _panel_health
  retries: 40
  delay: 3
  until: _panel_health.status == 200

- name: Create/sync the sudo admin from env
  ansible.builtin.command:
    cmd: docker compose exec -T marzneshin python3 marzneshin-cli.py admin import-from-env --yes
    chdir: "{{ panel_compose_dir }}"
  register: _admin
  changed_when: "'imported successfully' in _admin.stdout"

- name: Ensure Hiddify clients get the sing-box subscription format
  ansible.builtin.include_tasks: subscription_rules.yml
