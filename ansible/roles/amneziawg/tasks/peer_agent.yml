# Install the node-side peer agent the vpnbot drives over SSH. It only reads the
# server identity and edits awg0.conf + the live interface; it opens no port and
# runs no daemon, so it adds nothing to the node's attack surface.
- name: Install the awg-peer agent
  ansible.builtin.template:
    src: awg-peer.sh.j2
    dest: "{{ awg_peer_script }}"
    mode: "0750"
    owner: root
    group: root

# When the containerised bot's public key exists (generated by site.yml), restrict
# it to the awg-peer command with a forced command, so a compromised bot can only
# manage AWG peers here - never get a shell.
- name: Check for the vpnbot public key on the control node
  ansible.builtin.stat:
    path: "{{ vpnbot_ssh_key_path }}.pub"
  register: _vpnbot_pub
  delegate_to: localhost
  become: false

- name: Install the awg-peer forced-command wrapper
  ansible.builtin.template:
    src: awg-peer-ssh.j2
    dest: "{{ awg_peer_ssh_script }}"
    mode: "0750"
    owner: root
    group: root
  when: _vpnbot_pub.stat.exists

- name: Authorise the vpnbot key, restricted to the awg-peer command
  ansible.posix.authorized_key:
    user: root
    key: "{{ lookup('file', vpnbot_ssh_key_path + '.pub') }}"
    key_options: 'command="{{ awg_peer_ssh_script }}",restrict'
  when: _vpnbot_pub.stat.exists
