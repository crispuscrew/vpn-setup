# vpn.yaml - desired Marzneshin panel state, applied with `vpn apply -f vpn.yaml`.
#
# Protocols/inbounds themselves are defined by Ansible in each node's core config
# files; this file only groups the discovered inbounds into services and grants
# users. Panel URL and sudo-admin credentials come from the environment
# (VPN_PANEL_URL / VPN_PANEL_USERNAME / VPN_PANEL_PASSWORD) - never from this file.
#
# Reconcile is convergent and additive: it creates or updates what is declared and
# leaves anything else on the panel untouched (no pruning).

services:
  # The auto-select pool: every EXIT node. Russia is deliberately excluded - it sits
  # inside the censored network, so a direct Russia exit reaches nothing useful, and a
  # client's "Best Latency" would wrongly pick it (lowest ping from inside Russia). It
  # stays a grantable per-location service below, reserved as a future multi-hop entry
  # relay. List exit nodes explicitly so none joins the auto-select pool by accident.
  - name: all
    nodes: ["Estonia", "Serbia", "USA"]
  # Per-location services grant access to a single node, selected by its panel
  # node name. The bot's /add picker grants any subset of these to a user.
  - name: Estonia
    nodes: ["Estonia"]
  - name: Russia
    nodes: ["Russia"]
  - name: Serbia
    nodes: ["Serbia"]
  - name: USA
    nodes: ["USA"]

# Real users are provisioned by the bot's admin /add, not declared here. Add an
# entry only to manage a user as code (reconcile is additive - it never prunes).
users: []
