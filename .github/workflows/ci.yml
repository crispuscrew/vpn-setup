name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.10"
      - name: gofmt
        run: |
          files=$(find . -path ./vendor -prune -o -name '*.go' -print)
          test -z "$(gofmt -l $files)" || { gofmt -l $files; exit 1; }
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: test
        run: go test ./...
